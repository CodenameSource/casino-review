name: casino-review

# All three app services run the SAME image (built once from ./Dockerfile) and
# differ only by which binary they launch. This is the key to a bearable build
# on a small droplet: one compile, not three.
x-app: &app
  image: casino-review:local
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
  env_file: .env

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: casino
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-casino}
      POSTGRES_DB: casino
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U casino -d casino"]
      interval: 5s
      timeout: 3s
      retries: 10

  core:
    <<: *app
    command: ["core"]
    environment:
      DATABASE_URL: postgres://casino:${POSTGRES_PASSWORD:-casino}@postgres:5432/casino
      METRICS_ADDR: ":9090"

  # NOTE: keep runner at 1 replica. The checkout lock is process-local; scaled
  # replicas sharing the /work volume would race in the same working tree.
  runner:
    <<: *app
    command: ["runner"]
    environment:
      DATABASE_URL: postgres://casino:${POSTGRES_PASSWORD:-casino}@postgres:5432/casino
      METRICS_ADDR: ":9090"
      WORKDIR: /work
      REVIEWS_FILE: /config/reviews.json
    volumes:
      - runner-work:/work
      # Edit reviews.json on the host, then `docker compose restart runner`.
      - ./reviews.json:/config/reviews.json:ro

  slackbot:
    <<: *app
    command: ["slackbot"]
    environment:
      DATABASE_URL: postgres://casino:${POSTGRES_PASSWORD:-casino}@postgres:5432/casino
      METRICS_ADDR: ":9090"

volumes:
  pgdata:
  runner-work:
